name: Build and Push Images to GHCR

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: sarvjeetchhinna/pe-platform-capstone

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata (teams-app)
        id: meta_teams_app
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/teams-app
          tags: |
            type=raw,value=demo,enable={{is_default_branch}}
            type=sha,format=long
            type=ref,event=tag

      - name: Docker metadata (teams-api)
        id: meta_teams_api
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/teams-api
          tags: |
            type=raw,value=demo,enable={{is_default_branch}}
            type=sha,format=long
            type=ref,event=tag

      - name: Docker metadata (teams-operator)
        id: meta_teams_operator
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/teams-operator
          tags: |
            type=raw,value=demo,enable={{is_default_branch}}
            type=sha,format=long
            type=ref,event=tag

      - name: Build and push teams-app
        uses: docker/build-push-action@v6
        with:
          context: workshop/teams-management/teams-app
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta_teams_app.outputs.tags }}
          labels: ${{ steps.meta_teams_app.outputs.labels }}

      - name: Build and push teams-api
        uses: docker/build-push-action@v6
        with:
          context: workshop/teams-management/teams-api
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta_teams_api.outputs.tags }}
          labels: ${{ steps.meta_teams_api.outputs.labels }}

      - name: Build and push teams-operator
        uses: docker/build-push-action@v6
        with:
          context: workshop/teams-management/teams-operator
          file: workshop/teams-management/teams-operator/operator.Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta_teams_operator.outputs.tags }}
          labels: ${{ steps.meta_teams_operator.outputs.labels }}
