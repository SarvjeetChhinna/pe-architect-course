# k8s/teams-ui-rollout.yaml
apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: teams-ui
  namespace: engineering-platform
  labels:
    app: teams-ui
    component: frontend
spec:
  replicas: 3
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app: teams-ui
  template:
    metadata:
      labels:
        app: teams-ui
        component: frontend
    spec:
      containers:
      - name: teams-ui
        image: ghcr.io/sarvjeetchhinna/pe-platform-capstone/teams-app:v0.1.2
        ports:
        - containerPort: 80
        env:
        - name: API_URL
          value: "http://teams-api-service:4200"
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "100m"
        livenessProbe:
          httpGet:
            path: /health
            port: 80
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 5
  strategy:
    canary:
      stableService: teams-ui-service
      canaryService: teams-ui-canary-service
      steps:
      - setWeight: 50
      - pause:
          duration: 10
      - setWeight: 100
